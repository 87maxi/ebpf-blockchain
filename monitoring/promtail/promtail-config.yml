server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: ebpf-nodes
    static_configs:
      - targets:
          - localhost
        labels:
          job: ebpf-nodes
          __path__: /var/log/nodes/ebpf-node-*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            event: fields.event
            peer: fields.peer
            data_len: fields.data_len
      - labels:
          level:
          event:
          peer:
