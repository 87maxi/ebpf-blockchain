server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

# Scrape configurations
scrape_configs:
  # eBPF Node application logs - journald (systemd service)
  - job_name: ebpf-nodes
    journal:
      path: /var/log/journal
      max_age: 12h
      labels:
        cluster: ebpf-blockchain-lab
    pipeline_stages:
      # Filter only ebpf-blockchain service logs
      - match:
          expression: '{_SYSTEMD_UNIT="ebpf-blockchain.service"}'
      # Parse JSON structured logs from eBPF nodes
      - json:
          expressions:
            level: level
            message: message
            target: target
            thread_id: thread_id
            thread_name: thread_name
            file: file
            line: line
            timestamp: timestamp
      # Extract custom event fields from structured logs
      - regex:
          expressions:
            event: "event=(?P<event>[a-z_]+)"
      # Set proper timestamp from log (use stream time as fallback)
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      # Label by level for easy filtering
      - labels:
          level:
          event:
          component: _COMM

  # eBPF Node application logs - file fallback (legacy)
  - job_name: ebpf-node-logs-file
    static_configs:
      - targets:
          - localhost
        labels:
          job: ebpf-node-logs-file
          __path__: /var/log/ebpf-node/*.log
          cluster: ebpf-blockchain-lab
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            component: component
            timestamp: timestamp
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - labels:
          level:
          event:
          component:

  # Docker container logs
  - job_name: docker-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker-logs
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      - regex:
          expression: ".*(?P<level>(INFO|WARN|ERROR|DEBUG)).*"
      - timestamp:
          format: RFC3339Nano
          source: time

  # System logs
  - job_name: system-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: system-logs
          __path__: /var/log/*.log

  # Prometheus logs
  - job_name: prometheus-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: prometheus-logs
          __path__: /prometheus/*.log
