server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

# Scrape configurations
# NOTE: Using file-based log collection instead of journal input
# Reason: Journal input requires complex permissions and has syntax issues
# with match stage selectors in Promtail 2.9.0
scrape_configs:
  # eBPF Node application logs - file-based collection
  # The eBPF node service writes logs to /var/log/ebpf-node/ebpf-node.log
  # Logs are structured JSON output from tracing_subscriber
  - job_name: ebpf-nodes
    static_configs:
      - targets:
          - localhost
        labels:
          job: ebpf-nodes
          __path__: /var/log/ebpf-node/*.log
          cluster: ebpf-blockchain-lab
    pipeline_stages:
      # Parse JSON structured logs from eBPF nodes (tracing_subscriber output)
      - json:
          expressions:
            level: level
            message: message
            target: target
            thread_id: thread_id
            thread_name: thread_name
            file: file
            line: line
            timestamp: timestamp
      # Extract custom event fields from message content
      # eBPF nodes log events like: event=p2p_connected, event=gossip_tx_proposal, etc.
      - regex:
          expression: "event=(?P<event>[a-z_]+)"
      # Set proper timestamp from log (RFC3339Nano format)
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      # Create labels for easy filtering in Grafana
      - labels:
          level:
          event:
          target:

  # Docker container logs
  - job_name: docker-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker-logs
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      - regex:
          expression: ".*(?P<level>(INFO|WARN|ERROR|DEBUG)).*"
      - timestamp:
          format: RFC3339Nano
          source: time

  # System logs
  - job_name: system-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: system-logs
          __path__: /var/log/*.log

  # Prometheus logs
  - job_name: prometheus-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: prometheus-logs
          __path__: /prometheus/*.log
