server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

# Scrape configurations
scrape_configs:
  # eBPF Node application logs
  - job_name: ebpf-node-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: ebpf-node-logs
          __path__: /var/log/ebpf-node/*.log
          cluster: ebpf-blockchain-lab
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            component: component
            timestamp: timestamp
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - labels:
          level:
          event:
          component:

  # Docker container logs
  - job_name: docker-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker-logs
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      - regex:
          expression: ".*(?P<level>(INFO|WARN|ERROR|DEBUG)).*"
      - timestamp:
          format: RFC3339Nano
          source: time

  # System logs
  - job_name: system-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: system-logs
          __path__: /var/log/*.log

  # Prometheus logs
  - job_name: prometheus-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: prometheus-logs
          __path__: /prometheus/*.log
