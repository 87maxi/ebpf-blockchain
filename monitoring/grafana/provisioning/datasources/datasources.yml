apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    url: http://prometheus:9090
    isDefault: true
    access: proxy
    editable: true

  - name: Loki
    uid: Loki
    type: loki
    url: http://loki:3100
    isDefault: false
    access: proxy
    editable: true
    jsonData:
      maxLines: 1000
