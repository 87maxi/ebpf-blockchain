route:
  # Default receiver for alerts
  receiver: 'default-receiver'
  
  # Group alerts by cluster and severity
  group_by: ['alertname', 'cluster', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  
  # Route critical alerts immediately
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 1h
      continue: false
    
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 30s
      repeat_interval: 4h
      continue: false

receivers:
  # Default receiver - logs only
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://localhost:9090/webhook'
        send_resolved: true

  # Critical alerts - webhook only
  - name: 'critical-alerts'
    webhook_configs:
      - url: 'http://localhost:9090/webhook'
        send_resolved: true

  # Warning alerts - logs only
  - name: 'warning-alerts'
    webhook_configs:
      - url: 'http://localhost:9090/webhook'
        send_resolved: true

inhibit_rules:
  # Inhibit warning alerts if critical alerts are firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster']
