global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  # External labels para cluster awareness
  external_labels:
    cluster: 'ebpf-blockchain-lab'
    environment: 'development'

# Alertas configuradas
rule_files:
  - 'alerts.yml'
  - 'security-alerts.yml'
  - 'alertmanager.yml'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'localhost:9093'

# Scrape configs
scrape_configs:
  # eBPF Node metrics - 3 nodes
  - job_name: 'ebpf-node-1'
    static_configs:
      - targets:
          - '192.168.2.210:9090'
        labels:
          group: 'ebpf-cluster'
          node: 'node-1'

  - job_name: 'ebpf-node-2'
    static_configs:
      - targets:
          - '192.168.2.211:9090'
        labels:
          group: 'ebpf-cluster'
          node: 'node-2'

  - job_name: 'ebpf-node-3'
    static_configs:
      - targets:
          - '192.168.2.212:9090'
        labels:
          group: 'ebpf-cluster'
          node: 'node-3'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'
        labels:
          group: 'monitoring'

  # Node Exporter (system metrics from host)
  - job_name: 'node-exporter'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'localhost:9100'
        labels:
          group: 'ebpf-cluster'

  # Grafana dashboard monitoring
  - job_name: 'grafana'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'localhost:3000'
        labels:
          group: 'monitoring'

  # Block Generator metrics
  - job_name: 'ebpf-block-generator'
    static_configs:
      - targets:
          - 'localhost:9101'
        labels:
          group: 'ebpf-cluster'
          service: 'block-generator'
