global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  # External labels para cluster awareness
  external_labels:
    cluster: 'ebpf-blockchain-lab'
    environment: 'development'

# Alertas configuradas
rule_files:
  - 'alerts.yml'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'localhost:9093'

# Scrape configs
scrape_configs:
  # eBPF Node metrics
  - job_name: 'ebpf-node'
    static_configs:
      - targets:
          - 'localhost:9090'
        labels:
          group: 'ebpf-cluster'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'
        labels:
          group: 'monitoring'

  # Node Exporter (system metrics from host)
  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - 'localhost:9100'
        labels:
          group: 'ebpf-cluster'

  # Grafana dashboard monitoring
  - job_name: 'grafana'
    static_configs:
      - targets:
          - 'localhost:3000'
        labels:
          group: 'monitoring'
