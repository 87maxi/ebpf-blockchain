global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  # External labels para cluster awareness
  external_labels:
    cluster: 'ebpf-blockchain-lab'
    environment: 'development'

# Alertas configuradas
rule_files:
  - 'alerts.yml'
  - 'security-alerts.yml'
  - 'alertmanager.yml'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'localhost:9093'

# Scrape configs
scrape_configs:
  # eBPF Node metrics - 3 nodes
  - job_name: 'ebpf-node-1'
    static_configs:
      - targets:
          - '192.168.2.210:9090'
        labels:
          group: 'ebpf-cluster'
          node: 'node-1'

  - job_name: 'ebpf-node-2'
    static_configs:
      - targets:
          - '192.168.2.211:9090'
        labels:
          group: 'ebpf-cluster'
          node: 'node-2'

  - job_name: 'ebpf-node-3'
    static_configs:
      - targets:
          - '192.168.2.212:9090'
        labels:
          group: 'ebpf-cluster'
          node: 'node-3'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'
        labels:
          group: 'monitoring'

  # Node Exporter (system metrics from host)
  - job_name: 'node-exporter'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'localhost:9100'
        labels:
          group: 'ebpf-cluster'

  # Grafana dashboard monitoring
  - job_name: 'grafana'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'localhost:3000'
        labels:
          group: 'monitoring'

  # Block Generator metrics
  - job_name: 'ebpf-block-generator'
    static_configs:
      - targets:
          - 'localhost:9101'
        labels:
          group: 'ebpf-cluster'
          service: 'block-generator'

  # Attacker Node metrics
  - job_name: 'ebpf-attacker-1'
    static_configs:
      - targets:
          - 'fd42:cb45:3f5b:661:216:3eff:fe72:5c21:9090'
        labels:
          group: 'attack-surface'
          node: 'attacker-1'
          node_type: 'attacker'
          attack_position: 'external'
          attack_types: 'sybil,ddos,replay'

  - job_name: 'ebpf-attacker-2'
    static_configs:
      - targets:
          - 'fd42:cb45:3f5b:661:216:3eff:fe72:5c22:9090'
        labels:
          group: 'attack-surface'
          node: 'attacker-2'
          node_type: 'attacker'
          attack_position: 'internal'
          attack_types: 'eclipse,double_vote,consensus_manipulation'

  # Victim Node metrics
  - job_name: 'ebpf-victim-1'
    static_configs:
      - targets:
          - 'fd42:cb45:3f5b:661:216:3eff:fe72:5c31:9090'
        labels:
          group: 'attack-targets'
          node: 'victim-1'
          node_type: 'victim'
          targeted_by: 'ebpf-attacker-1'

  - job_name: 'ebpf-victim-2'
    static_configs:
      - targets:
          - 'fd42:cb45:3f5b:661:216:3eff:fe72:5c32:9090'
        labels:
          group: 'attack-targets'
          node: 'victim-2'
          node_type: 'victim'
          targeted_by: 'ebpf-attacker-2'
