global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "ebpf_node_1"
    static_configs:
      - targets: ["192.168.2.210:9090"]
    metrics_path: /metrics

  - job_name: "ebpf_node_2"
    static_configs:
      - targets: ["192.168.2.211:9090"]
    metrics_path: /metrics
