version: '3.8'

# ==============================================================================
# eBPF Blockchain Lab - Observability Stack
# ==============================================================================
# Este archivo levanta el stack de monitoreo (Prometheus + Grafana) en tu host.
# Como los nodos corren en contenedores LXC/LXD, Prometheus necesita poder
# alcanzar las IPs de esos contenedores (usualmente en la subred lxdbr0, ej: 10.x.x.x).
#
# Asegúrate de crear un archivo 'prometheus.yml' en el mismo directorio:
#
# global:
#   scrape_interval: 5s
# scrape_configs:
#   - job_name: 'ebpf_nodes'
#     static_configs:
#       - targets: ['<IP_LXC_NODO_1>:9090', '<IP_LXC_NODO_2>:9090']
# ==============================================================================

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    # Usamos network_mode: host para que el contenedor de Docker comparta la red
    # con tu máquina Host. Esto permite que Prometheus pueda alcanzar directamente
    # las IPs privadas virtuales de los contenedores LXC (ej. 10.x.x.x) sin ruteos complejos.
    network_mode: "host"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    network_mode: "host"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    restart: unless-stopped

volumes:
  grafana_data:

# ==============================================================================
# MANUAL DE LABORATORIO: LXC + Live Coding + Recompilación Reactiva
# ==============================================================================
#
# 1. INTEGRACIÓN CÓDIGO HOST -> NODO LXC (Cero Copias)
# ------------------------------------------------------------------------------
# Para desarrollar en tu IDE (VSCode) en el host y que el nodo LXC ejecute el
# código sin tener que regenerar imágenes ni copiar archivos, debes MONTAR el
# directorio de tu proyecto como un disco dentro del contenedor LXC:
#
#   lxc config device add <nombre_nodo_lxc> source_code disk source=/home/maxi/Documentos/source/ebpf-blockchain path=/root/ebpf-blockchain
#
# De esta forma, cualquier cambio guardado en tu Host se refleja al instante
# en /root/ebpf-blockchain dentro de LXC.
#
#
# 2. RECOMPILACIÓN REACTIVA (Hot-Reload) CON CARGO WATCH
# ------------------------------------------------------------------------------
# Para que el nodo se reinicie automáticamente cada vez que guardas un archivo
# en tu host, utilizaremos `cargo-watch` dentro del contenedor LXC.
#
# Entra al contenedor:
#   lxc exec <nombre_nodo_lxc> -- bash
#
# Instala cargo-watch (solo la primera vez):
#   cargo install cargo-watch
#
# Ve al directorio del nodo:
#   cd /root/ebpf-blockchain/ebpf-node
#
# Ejecuta el nodo en modo reactivo:
#   RUST_LOG=info cargo watch -c -w ebpf-node/src/ -w ebpf-node-ebpf/src/ -x 'run --bin ebpf-node -- --iface eth0'
#
# Explicación de los flags:
#   -c : Limpia la terminal antes de recompilar.
#   -w : Vigila cambios en el espacio de usuario (ebpf-node) y en el kernel (ebpf-node-ebpf).
#   -x : Comando a ejecutar (cargo run ...).
#
# IMPORTANTE: Al ser un contenedor privilegiado (root), `cargo run` puede
# cargar los mapas eBPF sin necesidad de usar `sudo`.
#
#
# 3. CONFIGURACIÓN DE GRAFANA (Al usar network_mode: host)
# ------------------------------------------------------------------------------
# 1. Abre http://localhost:3000 en el navegador de tu Host.
# 2. Ve a Data Sources -> Add Prometheus.
# 3. En la URL pon: http://localhost:9090 (Prometheus está usando el puerto
#    9090 nativo de tu máquina debido a network_mode: host).
# 4. Guarda y crea tus dashboards utilizando las queries PromQL mencionadas.
# ==============================================================================
