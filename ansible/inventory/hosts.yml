---
all:
  vars:
    ansible_user: root
    ansible_connection: ssh
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
    project_dir: /home/maxi/Documentos/source/ebpf-blockchain
    lxc_network: fd42:cb45:3f5b:661::/64
    lxc_gateway: fd42:cb45:3f5b:661::1
    lxc_profile: ebpf-blockchain
    lxc_bridge: lxdbr1

  children:
    lxc_nodes:
      vars:
        node_type: ebpf
        ansible_port: 22
      hosts:
        ebpf-node-1:
          ansible_host: fd42:cb45:3f5b:661:216:3eff:febd:56dc
          node_ip: 192.168.2.210
          node_name: ebpf-node-1
        ebpf-node-2:
          ansible_host: fd42:cb45:3f5b:661:216:3eff:fe8d:6064
          node_ip: 192.168.2.211
          node_name: ebpf-node-2
        ebpf-node-3:
          ansible_host: fd42:cb45:3f5b:661:216:3eff:fe8f:b737
          node_ip: 192.168.2.212
          node_name: ebpf-node-3

    attacker_nodes:
      vars:
        node_type: attacker
      hosts:
        ebpf-attacker-1:
          ansible_host: fd42:cb45:3f5b:661:216:3eff:fe72:5c21
          node_ip: fd42:cb45:3f5b:661:216:3eff:fe72:5c21
          node_name: ebpf-attacker-1

    victim_nodes:
      vars:
        node_type: victim
      hosts:
        ebpf-victim-1:
          ansible_host: fd42:cb45:3f5b:661:216:3eff:fe72:5c31
          node_ip: fd42:cb45:3f5b:661:216:3eff:fe72:5c31
          node_name: ebpf-victim-1

    monitoring:
      vars:
        node_type: monitoring
        ansible_connection: local
      hosts:
        localhost:
          ansible_host: localhost
          prometheus_port: 9090
          grafana_port: 3000
          grafana_admin: admin
          grafana_password: admin

    dev_environment:
      vars:
        node_type: development
        ansible_connection: local
        dev_mode: true
        debug_enabled: true
      hosts:
        localhost:
          ansible_host: localhost
          dev_port_prometheus: 9090
          dev_port_grafana: 3000
          dev_port_loki: 3100
          dev_port_tempo: 3200
