---
- name: Check if Docker is installed
  command: which docker
  register: docker_check
  failed_when: false
  changed_when: false

- name: Fail if Docker is not installed
  fail:
    msg: "Docker is required. Please install Docker first."
  when: docker_check.rc != 0

- name: Check if Docker Compose is available
  command: docker compose version
  register: compose_check
  failed_when: false
  changed_when: false
  ignore_errors: true

- name: Set compose command
  set_fact:
    compose_cmd: "docker compose"
  when: compose_check.rc == 0

- name: Set compose command (legacy)
  set_fact:
    compose_cmd: "docker-compose"
  when: compose_check.rc != 0

- name: Create monitoring directories
  file:
    path: "{{ project_dir }}/monitoring"
    state: directory
  changed_when: false

- name: Create prometheus config directory
  file:
    path: "{{ project_dir }}/monitoring/prometheus"
    state: directory
  changed_when: false

- name: Create grafana provisioning directories
  file:
    path: "{{ project_dir }}/monitoring/grafana/provisioning/{dashboards,datasources}"
    state: directory
  changed_when: false

- name: Create grafana dashboards directory
  file:
    path: "{{ project_dir }}/monitoring/grafana/dashboards"
    state: directory
  changed_when: false

- name: Create alertmanager directory
  file:
    path: "{{ project_dir }}/monitoring/alertmanager"
    state: directory
  changed_when: false

- name: Create loki directory
  file:
    path: "{{ project_dir }}/monitoring/loki"
    state: directory
  changed_when: false

- name: Create promtail directory
  file:
    path: "{{ project_dir }}/monitoring/promtail"
    state: directory
  changed_when: false

- name: Create tempo directory
  file:
    path: "{{ project_dir }}/monitoring/tempo"
    state: directory
  changed_when: false

- name: Create node-exporter directory
  file:
    path: "{{ project_dir }}/monitoring/node-exporter"
    state: directory
  changed_when: false

- name: Deploy Prometheus configuration
  template:
    src: prometheus.yml.j2
    dest: "{{ project_dir }}/monitoring/prometheus/prometheus.yml"
    mode: '0644'
  register: prometheus_config

- name: Create Prometheus docker-compose file
  template:
    src: docker-compose.monitoring.yml.j2
    dest: "{{ project_dir }}/monitoring/docker-compose.yml"
    mode: '0644'
  register: compose_file

- name: Start monitoring stack
  shell: |
    cd {{ project_dir }}/monitoring
    {{ compose_cmd }} up -d
  register: compose_up
  changed_when: true
  when: prometheus_config.changed or compose_file.changed

- name: Wait for Prometheus to be ready
  wait_for:
    port: 9090
    host: localhost
    timeout: 60
  ignore_errors: true

- name: Wait for Grafana to be ready
  wait_for:
    port: 3000
    host: localhost
    timeout: 60
  ignore_errors: true

- name: Configure Prometheus datasource in Grafana
  uri:
    url: "http://localhost:3000/api/datasources"
    method: POST
    user: admin
    password: admin
    body_format: json
    body:
      name: Prometheus
      type: prometheus
      url: http://prometheus:9090
      access: proxy
      isDefault: true
    status_code: [200, 409]
  ignore_errors: true

- name: Deploy Grafana dashboards
  template:
    src: dashboard.json.j2
    dest: "{{ project_dir }}/monitoring/grafana/provisioning/dashboards/ebpf-cluster.json"
    mode: '0644'
  register: dashboard

- name: Reload Grafana to apply dashboards
  shell: docker restart grafana
  when: dashboard.changed
  changed_when: true
  ignore_errors: true

- name: Display monitoring URLs
  debug:
    msg: |
      ========================================
      Monitoring Stack
      ========================================
      Prometheus: http://localhost:9090
      Grafana: http://localhost:3000 (admin/admin)
      ========================================
