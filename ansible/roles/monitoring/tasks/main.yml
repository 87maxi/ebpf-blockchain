---
- name: Check if Docker is installed
  command: which docker
  register: docker_check
  failed_when: false
  changed_when: false

- name: Fail if Docker is not installed
  fail:
    msg: "Docker is required. Please install Docker first."
  when: docker_check.rc != 0

- name: Check if Docker Compose is available
  command: docker compose version
  register: compose_check
  failed_when: false
  changed_when: false
  ignore_errors: true

- name: Set compose command
  set_fact:
    compose_cmd: "docker compose"
  when: compose_check.rc == 0

- name: Set compose command (legacy)
  set_fact:
    compose_cmd: "docker-compose"
  when: compose_check.rc != 0

# ---- Copy monitoring files from repository ----
- name: Copy monitoring directory to target
  synchronize:
    src: "{{ project_dir }}/monitoring/"
    dest: "{{ project_dir }}/monitoring/"
    recursive: yes
    rsync_opts:
      - "--exclude=__pycache__"
      - "--exclude=.git"
  changed_when: false
  ignore_errors: true

- name: Generate Prometheus configuration from template
  template:
    src: prometheus.yml.j2
    dest: "{{ project_dir }}/monitoring/prometheus/prometheus.yml"
    mode: '0644'
  register: prometheus_config

- name: Ensure monitoring directories exist
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ project_dir }}/monitoring/prometheus/rules"
    - "{{ project_dir }}/monitoring/grafana/provisioning/dashboards"
    - "{{ project_dir }}/monitoring/grafana/provisioning/datasources"
    - "{{ project_dir }}/monitoring/grafana/dashboards"
    - "{{ project_dir }}/monitoring/loki"
    - "{{ project_dir }}/monitoring/promtail"
    - "{{ project_dir }}/monitoring/tempo"
  changed_when: false

# ---- Start monitoring stack using docker compose from monitoring/ ----
- name: Start monitoring stack
  shell: |
    cd {{ project_dir }}/monitoring
    {{ compose_cmd }} up -d
  register: compose_up
  changed_when: true
  when: prometheus_config.changed | default(true)

- name: Wait for Prometheus to be ready
  wait_for:
    port: 9090
    host: localhost
    timeout: 60
  ignore_errors: true

- name: Wait for Grafana to be ready
  wait_for:
    port: 3000
    host: localhost
    timeout: 60
  ignore_errors: true

- name: Display monitoring URLs
  debug:
    msg: |
      ========================================
      Monitoring Stack
      ========================================
      Prometheus: http://localhost:9090
      Grafana:    http://localhost:3000 (admin/admin)
      Loki:       http://localhost:3100
      Tempo:      http://localhost:3200
      Node Exporter: http://localhost:9100
      ========================================
